name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run simple check
        run: |
          echo "Build Successful 🚀"
          cat index.txt
          echo "Checking file exists..."
          test -f index.txt

      - name: Build Docker Image
        run: docker build -t myweb .
